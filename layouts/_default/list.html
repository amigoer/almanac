{{ define "main" }}
<div class="space-y-8">
  <header class="space-y-2 pb-6 border-b border-border">
    <div class="text-[11px] font-mono uppercase tracking-[0.22em] text-brand">SECTION</div>
    <h1 class="text-3xl md:text-4xl font-bold tracking-tight">{{ .Title }}</h1>
    {{ with .Description }}<p class="font-serif text-base md:text-lg text-muted-foreground leading-relaxed">{{ . }}</p>{{ end }}
    {{ with .Content }}<div class="prose-amigoer">{{ . }}</div>{{ end }}
    <div class="text-[11px] font-mono uppercase tracking-wider text-muted-foreground/70">{{ len .Pages }} {{ i18n "posts" }}</div>
  </header>

  <div class="flex flex-col gap-4">
    {{ range .Pages.ByDate.Reverse }}
      {{ partial "card-post.html" . }}
    {{ end }}
  </div>

  {{ partial "pagination.html" . }}
</div>
{{ end }}
