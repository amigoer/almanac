{{ define "main" }}
<div class="mx-auto max-w-md px-4 py-20 text-center space-y-4">
  <div class="text-7xl font-bold tracking-tight text-muted-foreground/40">404</div>
  <h1 class="text-2xl font-semibold tracking-tight">{{ i18n "notFoundTitle" }}</h1>
  <p class="text-muted-foreground">{{ i18n "notFoundSubtitle" }}</p>
  <a href="{{ "/" | relURL }}" class="inline-flex items-center gap-1.5 rounded-md bg-primary text-primary-foreground px-4 py-2 text-sm font-medium hover:bg-primary/90 transition-colors">
    {{ i18n "backHome" }} {{ partial "icon.html" (dict "name" "arrow-right" "class" "size-3.5") }}
  </a>
</div>
{{ end }}
