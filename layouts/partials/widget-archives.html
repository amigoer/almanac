{{- /* 归档 widget — Vercel 风格 */ -}}
{{- $pages := where .Site.RegularPages "Section" "in" (slice "posts" "travel" "interview") -}}
{{ if $pages }}
<section>
  <h3 class="mb-2.5 text-[10px] font-mono uppercase tracking-[0.15em] text-muted-foreground">ARCHIVES</h3>
  <div class="flex flex-col">
    {{ range first 6 ($pages.GroupByDate "2006-01") }}
      <a href="{{ "/archives/" | relURL }}#{{ .Key }}"
         class="flex items-center justify-between py-1.5 text-xs text-muted-foreground hover:text-foreground border-b border-border/60 last:border-0 transition-colors">
        <span class="font-mono">{{ .Key }}</span>
        <span class="text-[10px] tabular-nums opacity-60">{{ len .Pages }}</span>
      </a>
    {{ end }}
    <a href="{{ "/archives/" | relURL }}" class="mt-2 text-[11px] font-mono uppercase tracking-wider text-muted-foreground hover:text-foreground">
      {{ i18n "sidebarViewAll" }}
    </a>
  </div>
</section>
{{ end }}
