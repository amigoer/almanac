{{- /* 分类列表 widget */ -}}
{{- $categories := .Site.Taxonomies.categories -}}
{{ if $categories }}
<div>
  <h3 class="mb-3 flex items-center gap-1.5 text-[10px] font-semibold uppercase tracking-wider text-muted-foreground">
    {{ partial "icon.html" (dict "name" "folder" "class" "size-3") }}
    {{ i18n "sidebarCategories" }}
  </h3>
  <div class="flex flex-col gap-0.5">
    {{ range $name, $taxonomy := $categories }}
      <a href="{{ "/categories/" | relURL }}{{ $name | urlize }}/"
         class="group flex items-center justify-between rounded-md px-2.5 py-1.5 text-sm text-muted-foreground hover:bg-accent hover:text-foreground transition-colors">
        <span class="flex items-center gap-1.5">
          <span class="size-1 rounded-full bg-muted-foreground/40 group-hover:bg-brand"></span>
          {{ $name }}
        </span>
        <span class="text-[10px] tabular-nums opacity-60">{{ len $taxonomy.Pages }}</span>
      </a>
    {{ end }}
  </div>
</div>
{{ end }}
